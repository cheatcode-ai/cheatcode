name: Deploy Workers

# This reusable workflow releases the Cloudflare backend for one immutable commit.
# Its caller prepares the matching Vercel artifact before invoking it and applies
# schema contractions only after both backend and frontend releases are verified.
on:
  workflow_call:
    inputs:
      confirmation:
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: production
    steps:
      - name: Authorize coordinated backend release
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Backend releases must originate from a manual Production Release run." >&2
            exit 1
          fi
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Backend releases must target main." >&2
            exit 1
          fi
          if [ "$CONFIRMATION" != "RELEASE_PRODUCTION" ]; then
            echo "Backend release confirmation must exactly match RELEASE_PRODUCTION." >&2
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
      - name: Verify release commit
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - name: Require successful static checks for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          successful_runs="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/static-checks.yml/runs" \
            --field branch=main \
            --field event=push \
            --field head_sha="$GITHUB_SHA" \
            --field per_page=1 \
            --field status=success \
            --jq '.total_count')"
          if [ "$successful_runs" -lt 1 ]; then
            echo "Static Checks has not succeeded for $GITHUB_SHA on main." >&2
            exit 1
          fi
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.34.5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Rebuild every backend deployable before the first Worker mutation. Static
      # Checks already proved this exact commit before the expand migration gate.
      - name: Build backend release
        run: >-
          pnpm turbo build
          --filter=@cheatcode/gateway-worker
          --filter=@cheatcode/agent-worker
          --filter=@cheatcode/webhooks-worker
          --filter=@cheatcode/preview-proxy
      # The shared script deploys the new gateway with its public release gate
      # closed, verifies the exact-SHA 503 barrier, deploys and verifies agent
      # through that closed health endpoint, then reopens the same gateway build.
      # Webhooks and preview follow only after gateway+agent are current. Partial
      # production Worker deploys are rejected by the script.
      - name: Deploy backend behind fail-closed release barrier
        run: pnpm deploy:workers -- --apply --skip-build
        env:
          CHEATCODE_PROD_DEPLOY_APPROVED: "true"
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Verify exact backend release
        env:
          GATEWAY_HEALTH_URL: ${{ vars.GATEWAY_HEALTH_URL || 'https://gateway.trycheatcode.com/health' }}
          PREVIEW_PROXY_HEALTH_URL: ${{ vars.PREVIEW_PROXY_HEALTH_URL || 'https://preview.trycheatcode.com/health' }}
          RELEASE_SHA: ${{ github.sha }}
          WEBHOOKS_HEALTH_URL: ${{ vars.WEBHOOKS_HEALTH_URL || 'https://webhooks.trycheatcode.com/health' }}
        run: |
          readonly MAX_ATTEMPTS=24
          readonly POLL_INTERVAL_SECONDS=5

          wait_for_release() {
            local health_url="$1"
            local label="$2"
            local jq_filter="$3"
            local attempt
            local response

            for ((attempt = 1; attempt <= MAX_ATTEMPTS; attempt += 1)); do
              if response="$(curl \
                --fail-with-body \
                --silent \
                --show-error \
                --connect-timeout 5 \
                --max-time 15 \
                --header "Accept: application/json" \
                --header "Cache-Control: no-cache" \
                "$health_url")" &&
                jq --exit-status --arg sha "$RELEASE_SHA" "$jq_filter" \
                  <<<"$response" > /dev/null 2>&1; then
                echo "$label reports release $RELEASE_SHA."
                return 0
              fi

              echo "$label has not converged to $RELEASE_SHA (attempt $attempt/$MAX_ATTEMPTS)."
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                sleep "$POLL_INTERVAL_SECONDS"
              fi
            done

            echo "$label did not converge to $RELEASE_SHA within the release window." >&2
            return 1
          }

          wait_for_release "$GATEWAY_HEALTH_URL" "Gateway and agent" '
            .ok == true and
            .releaseSha == $sha and
            .agent.ok == true and
            .agent.releaseSha == $sha
          '
          wait_for_release "$WEBHOOKS_HEALTH_URL" "Webhooks worker" '
            .ok == true and .worker == "webhooks" and .releaseSha == $sha
          '
          wait_for_release "$PREVIEW_PROXY_HEALTH_URL" "Preview proxy" '
            .ok == true and .worker == "preview-proxy" and .releaseSha == $sha
          '
      - name: Record release
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          {
            echo "### Cloudflare backend release"
            echo "- Commit: \`$RELEASE_SHA\`"
            echo "- Release barrier: gateway closed and agent convergence verified before reopening"
            echo "- Migration gate: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Health: gateway, agent, webhooks, and preview proxy verified at this commit"
          } >> "$GITHUB_STEP_SUMMARY"
