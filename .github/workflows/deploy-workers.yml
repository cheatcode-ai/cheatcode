name: Deploy Workers

# Reusable half-release for one immutable commit. `stage-closed` closes the
# gateway, lets already-admitted agent/webhook work drain, then closes every writer.
# `open` verifies that exact barrier, proves the dedicated signed database roles,
# performs the isolated V1 retirement, then opens agent and webhooks with the
# matching gateway always deployed last.
on:
  workflow_call:
    inputs:
      confirmation:
        required: true
        type: string
      frontend_deployment_id:
        required: false
        default: ""
        type: string
      phase:
        required: true
        type: string
      production_web_origin:
        required: false
        default: ""
        type: string
      production_resource_fingerprint:
        required: true
        type: string
      release_sha:
        required: true
        type: string
      superseded_release_sha:
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-backend:
    runs-on: ubuntu-24.04
    # The script admits mutations only when its 230-minute stage budget and
    # separate 50-minute fail-closed recovery reserve fit inside this job.
    timeout-minutes: 360
    environment: production
    steps:
      - name: Authorize coordinated backend release phase
        env:
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CONFIRMATION: ${{ inputs.confirmation }}
          FRONTEND_DEPLOYMENT_ID: ${{ inputs.frontend_deployment_id }}
          PRODUCTION_WEB_ORIGIN: ${{ inputs.production_web_origin }}
          PRODUCTION_RESOURCE_FINGERPRINT: ${{ inputs.production_resource_fingerprint }}
          RELEASE_PHASE: ${{ inputs.phase }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SUPERSEDED_RELEASE_SHA: ${{ inputs.superseded_release_sha }}
        run: |
          expected_caller_workflow_ref="${GITHUB_REPOSITORY}/.github/workflows/production-release.yml@refs/heads/main"
          if [ "$CALLER_WORKFLOW_REF" != "$expected_caller_workflow_ref" ]; then
            echo "Backend releases must be called by the exact main production-release workflow." >&2
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Backend releases must originate from a manual Production Release run." >&2
            exit 1
          fi
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Backend releases must target main." >&2
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The backend release SHA must be a full lowercase 40-character Git commit SHA." >&2
            exit 1
          fi
          if [[ ! "$PRODUCTION_RESOURCE_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]]; then
            echo "The backend release requires the exact production resource fingerprint." >&2
            exit 1
          fi
          if [ -n "$SUPERSEDED_RELEASE_SHA" ] && {
            [ "$RELEASE_PHASE" != "stage-closed" ] ||
            [[ ! "$SUPERSEDED_RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] ||
            [ "$SUPERSEDED_RELEASE_SHA" = "$RELEASE_SHA" ];
          }; then
            echo "A superseded release must be a different closed SHA on stage-closed." >&2
            exit 1
          fi
          case "$RELEASE_PHASE:$CONFIRMATION" in
            stage-closed:STAGE_PRODUCTION_CLOSED)
              if [ -n "$PRODUCTION_WEB_ORIGIN" ] || [ -n "$FRONTEND_DEPLOYMENT_ID" ]; then
                echo "stage-closed must not receive production frontend identity." >&2
                exit 1
              fi
              ;;
            open:OPEN_PRODUCTION)
              if [ "$PRODUCTION_WEB_ORIGIN" != "https://trycheatcode.com" ] ||
                 [[ ! "$FRONTEND_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]+$ ]]; then
                echo "open requires the canonical origin and verified Vercel deployment ID." >&2
                exit 1
              fi
              ;;
            *)
              echo "Confirmation does not authorize release phase $RELEASE_PHASE." >&2
              exit 1
              ;;
          esac
          started_at_seconds="$(date +%s)"
          if [[ ! "$started_at_seconds" =~ ^[0-9]{10}$ ]]; then
            echo "Could not establish the backend release job deadline." >&2
            exit 1
          fi
          echo "CHEATCODE_RELEASE_JOB_STARTED_AT_MS=${started_at_seconds}000" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_sha }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: .release-control
          ref: ${{ github.sha }}
          sparse-checkout: .github/actions/verify-release-control
      - uses: ./.release-control/.github/actions/verify-release-control
        with:
          control-sha: ${{ github.sha }}
          release-sha: ${{ inputs.release_sha }}
      - run: rm -rf .release-control
      - name: Require successful static checks for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          successful_runs="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/static-checks.yml/runs" \
            --field branch=main \
            --field event=push \
            --field head_sha="$RELEASE_SHA" \
            --field per_page=1 \
            --field status=success \
            --jq '.total_count')"
          if [ "$successful_runs" -lt 1 ]; then
            echo "Static Checks has not succeeded for $RELEASE_SHA on main." >&2
            exit 1
          fi
      - uses: ./.github/actions/setup-repository
        with:
          release-sha: ${{ inputs.release_sha }}
      - name: Build backend release phase
        env:
          RELEASE_PHASE: ${{ inputs.phase }}
        run: |
          if [ "$RELEASE_PHASE" = "open" ]; then
            pnpm turbo build \
              --filter=@cheatcode/gateway-worker \
              --filter=@cheatcode/agent-worker \
              --filter=@cheatcode/webhooks-worker
          else
            pnpm turbo build \
              --filter=@cheatcode/gateway-worker \
              --filter=@cheatcode/agent-worker \
              --filter=@cheatcode/webhooks-worker \
              --filter=@cheatcode/preview-proxy
          fi
      - name: Pull Vercel production project identity
        if: ${{ inputs.phase == 'open' }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Reverify canonical alias immediately before backend OPEN
        if: ${{ inputs.phase == 'open' }}
        env:
          DEPLOYMENT_ID: ${{ inputs.frontend_deployment_id }}
          PRODUCTION_WEB_ORIGIN: ${{ inputs.production_web_origin }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          project_name="$(jq --exit-status --raw-output '.projectName' .vercel/project.json)"
          inspection="$(timeout --signal=TERM 15s pnpm exec vercel inspect \
            "$PRODUCTION_WEB_ORIGIN" --format=json --token="$VERCEL_TOKEN")"
          jq --exit-status \
            --arg id "$DEPLOYMENT_ID" \
            --arg project "$project_name" '
              .id == $id and .name == $project and
              .target == "production" and .readyState == "READY"
            ' <<<"$inspection" > /dev/null
      - name: Apply fail-closed backend release phase
        env:
          CHEATCODE_MIGRATION_ATTESTATIONS: ${{ secrets.CHEATCODE_MIGRATION_ATTESTATIONS }}
          CHEATCODE_FRONTEND_DEPLOYMENT_ID: ${{ inputs.frontend_deployment_id }}
          CHEATCODE_RELEASE_SHA: ${{ inputs.release_sha }}
          CHEATCODE_PRODUCTION_WEB_ORIGIN: ${{ inputs.production_web_origin }}
          CHEATCODE_PRODUCTION_RESOURCE_FINGERPRINT: ${{ inputs.production_resource_fingerprint }}
          CHEATCODE_SUPERSEDE_CLOSED_SHA: ${{ inputs.superseded_release_sha }}
          CHEATCODE_PROD_DEPLOY_APPROVED: "true"
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_RESOURCE_READ_API_TOKEN: ${{ secrets.CLOUDFLARE_RESOURCE_READ_API_TOKEN }}
          RELEASE_PHASE: ${{ inputs.phase }}
          RELEASE_DATABASE_READINESS_SECRET: ${{ secrets.RELEASE_DATABASE_READINESS_SECRET }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SUPABASE_MIGRATION_EXPECTED_DATABASE: ${{ vars.SUPABASE_MIGRATION_EXPECTED_DATABASE }}
          SUPABASE_MIGRATION_EXPECTED_HOST: ${{ vars.SUPABASE_MIGRATION_EXPECTED_HOST }}
          SUPABASE_MIGRATION_EXPECTED_ROLE: ${{ vars.SUPABASE_MIGRATION_EXPECTED_ROLE }}
          SUPABASE_MIGRATION_EXPECTED_SYSTEM_IDENTIFIER: ${{ vars.SUPABASE_MIGRATION_EXPECTED_SYSTEM_IDENTIFIER }}
          SUPABASE_MIGRATION_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ inputs.phase == 'open' && secrets.VERCEL_TOKEN || '' }}
        run: pnpm deploy:workers -- --phase "$RELEASE_PHASE" --apply --skip-build
      - name: Record release phase
        continue-on-error: true
        env:
          RELEASE_PHASE: ${{ inputs.phase }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SUPERSEDED_RELEASE_SHA: ${{ inputs.superseded_release_sha }}
        run: |
          {
            echo "### Cloudflare backend: $RELEASE_PHASE"
            echo "- Commit: \`$RELEASE_SHA\`"
            if [ -n "$SUPERSEDED_RELEASE_SHA" ]; then
              echo "- Superseded closed SHA: \`$SUPERSEDED_RELEASE_SHA\`"
            fi
            echo "- Migration gate: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [ "$RELEASE_PHASE" = "stage-closed" ]; then
              echo "- Barrier: gateway, agent, and webhooks are verified CLOSED; every Workflow writer is drained; preview proxy matches this commit"
            else
              echo "- Barrier: dedicated database roles were proved before and after isolated V1 retirement; agent and webhooks reopened first; matching gateway was verified OPEN last after exact production web reverification"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
