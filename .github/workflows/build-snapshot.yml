name: Build Sandbox Snapshot

# Rebuilds + republishes the Daytona sandbox snapshot whenever the sandbox image
# changes. Builds on Daytona's infra (no Docker/cross-arch build needed in CI).
# Keeps the `cheatcode-sandbox` snapshot name stable so the agent-worker's
# DAYTONA_SANDBOX_SNAPSHOT var never has to change.
on:
  push:
    branches: [main]
    paths:
      - "infra/containers/sandbox/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daytona-snapshot
  cancel-in-progress: false

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    environment: production
    env:
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Daytona CLI
        # Direct release-binary download — the old install.sh URL now 404s, and `-sf` hid it as a
        # silent exit 127. `-sSf` fails loudly if the URL ever breaks again.
        run: |
          curl -sSfL -o daytona \
            "https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64"
          chmod +x daytona
          sudo mv daytona /usr/local/bin/daytona
          daytona version
          # The CLI no longer auto-reads DAYTONA_API_KEY; a profile must be created explicitly.
          daytona login --api-key "$DAYTONA_API_KEY"
      - name: Build & publish snapshot
        run: |
          # Idempotent: drop the previous snapshot of this name (existing sandboxes are
          # unaffected — they already hold their own copy) then rebuild. The delete is ASYNC
          # when the snapshot is referenced by active sandboxes, so wait for the name to free
          # before creating (else create fails with a name conflict). Trailing space in the grep
          # matches only the exact name, not e.g. cheatcode-sandbox-viewer-bundle.
          daytona snapshot delete cheatcode-sandbox 2>/dev/null || true
          for i in $(seq 1 60); do
            if ! daytona snapshot list 2>/dev/null | grep -q "cheatcode-sandbox "; then
              echo "snapshot name freed after ~$((i*5))s"
              break
            fi
            sleep 5
          done
          daytona snapshot create cheatcode-sandbox \
            -f infra/containers/sandbox/Dockerfile \
            -c infra/containers/sandbox \
            --cpu 2 --memory 4 --disk 10
