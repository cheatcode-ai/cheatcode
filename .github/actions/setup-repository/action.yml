name: Setup repository
description: Verify an optional release commit and install the pinned Node and pnpm workspace.

inputs:
  release-sha:
    description: Optional full commit SHA that the checked-out repository must match.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Verify release commit
      if: inputs.release-sha != ''
      shell: bash
      env:
        RELEASE_SHA: ${{ inputs.release-sha }}
      run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 11.8.0
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: 22.22.2
        cache: pnpm
    - name: Install workspace dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
