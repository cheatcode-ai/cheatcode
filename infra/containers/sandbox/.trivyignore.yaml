vulnerabilities:
  - id: CVE-2018-7408
    paths:
      - opt/code-server-4.128.0-linux-amd64/lib/vscode/extensions/npm/package.json
    purls:
      - pkg:npm/npm@1.0.1
    expired_at: 2026-10-15
    statement: >-
      VS Code's built-in npm language extension is named "npm" and uses extension
      version 1.0.1; this manifest is not the npm CLI package. The executable npm
      runtime is independently pinned under /opt/cheatcode-package-manager.
