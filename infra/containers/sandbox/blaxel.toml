name = "cheatcode-sandbox"
type = "sandbox"
description = "Cheatcode hosted project sandbox image with Node, Python, and document tooling."

[runtime]
generation = "mk3"
memory = 4096

[[runtime.ports]]
name = "web-preview"
target = 5173
protocol = "HTTP"

[[runtime.ports]]
name = "api-preview"
target = 8000
protocol = "HTTP"

[[runtime.ports]]
name = "takeover-vnc"
target = 6080
protocol = "HTTP"

[env]
NODE_ENV = "development"
PYTHONUNBUFFERED = "1"
