packages:
  - apps/*
  - packages/*

allowBuilds:
  '@google/genai': false
  bufferutil: false
  core-js: false
  esbuild: true
  lefthook: false
  protobufjs: false
  sharp: false
  utf-8-validate: false
  workerd: true

# These exact artifacts were already pinned and reviewed before the pnpm 11
# cutover. Every other version remains subject to pnpm 11's default 24-hour
# release-age quarantine.
minimumReleaseAgeExclude:
  - '@clerk/backend@3.11.6'
  - '@clerk/nextjs@7.5.19'
  - '@clerk/react@6.12.4'
  - '@clerk/shared@4.25.4'
  - '@clerk/ui@1.25.4'
  - '@cloudflare/workers-types@5.20260716.1'
  - '@vercel/backends@0.8.24'
  - '@vercel/build-utils@13.33.1'
  - '@vercel/cervel@0.1.32'
  - '@vercel/elysia@0.1.101'
  - '@vercel/express@0.1.115'
  - '@vercel/fastify@0.1.104'
  - '@vercel/gatsby-plugin-vercel-builder@2.2.27'
  - '@vercel/h3@0.1.110'
  - '@vercel/hono@0.2.104'
  - '@vercel/koa@0.1.84'
  - '@vercel/nestjs@0.2.105'
  - '@vercel/node@5.8.25'
  - '@vercel/static-build@2.11.7'
  - 'vercel@56.2.1'

overrides:
  # Security floors enforced by the production lockfile audit. These transitive
  # packages do not yet have upstream parents whose declared ranges include the
  # patched releases.
  '@hono/node-server@<2.0.10': 2.0.10
  '@clerk/localizations': 4.13.3
  '@clerk/shared': 4.25.4
  '@esbuild-kit/core-utils>esbuild': 0.25.12
  '@tootallnate/once@>=2.0.0 <2.0.1': 2.0.1
  '@vercel/node@5.8.25>undici': 6.27.0
  'ajv@>=8.0.0 <8.18.0': 8.20.0
  'dompurify@<=3.4.10': 3.4.11
  'fast-uri@<3.1.4': 3.1.4
  'js-yaml@<3.15.0': 3.15.0
  'js-yaml@>=4.0.0 <4.3.0': 4.3.0
  'minimatch@>=10.0.0 <10.2.3': 10.2.5
  'path-to-regexp@>=6.0.0 <6.3.0': 6.3.0
  'path-to-regexp@>=8.0.0 <8.4.0': 8.4.2
  'postcss@<8.5.10': 8.5.10
  'sharp@<0.35.0': 0.35.0
  'smol-toml@<1.6.1': 1.6.1
  'tar@>=7.0.0 <7.5.11': 7.5.20
  'tsx@4.21.0': 4.22.4
  'undici@>=6.0.0 <6.27.0': 6.27.0
  'undici@>=7.0.0 <7.28.0': 7.28.0
  'utf-8-validate@>=5.0.2': 5.0.10
  'uuid@<11.1.1': 11.1.1
  'vercel@56.2.1>undici': 6.27.0

# Mastra 1.51 uses these AI SDK v5 packages only for its v5 message types, but
# their stale manifests still exclude Zod 4. Mastra itself supports Zod 4; keep
# this exact, removable allowance until upstream mastra-ai/mastra#16994 ships.
peerDependencyRules:
  allowedVersions:
    '@ai-sdk/provider-utils@2.2.8>zod': '^4.0.0'
    '@ai-sdk/ui-utils@1.2.11>zod': '^4.0.0'

