services:
  # Backend API with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - ENV_MODE=local
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
      - INNGEST_DEV=1
      - INNGEST_BASE_URL=http://inngest:8288
      - INNGEST_SERVE_ORIGIN=http://backend:8000
    depends_on:
      redis:
        condition: service_healthy
      inngest:
        condition: service_started
    networks:
      - dev-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Frontend with hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    networks:
      - dev-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Inngest Dev Server (local function invocation)
  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    environment:
      - INNGEST_LOG_LEVEL=info
    networks:
      - dev-network
    command: inngest dev -u http://backend:8000/api/inngest

  # Redis
  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - dev-network
    command: redis-server --appendonly yes --bind 0.0.0.0 --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  dev-network:
    driver: bridge

volumes:
  redis_data:
